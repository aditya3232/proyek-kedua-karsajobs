# deploy & check :
# kubectl apply -f karsajobs-service.yml
# kubectl get svc -n karsajobs

apiVersion: v1 # API version untuk resource Service
kind: Service # Jenis resource: Service
metadata:
  name: karsajobs-service # Nama Service
  namespace: karsajobs # Namespace tempat Service dibuat
spec:
  type: NodePort
  selector:
    app: karsajobs # Selector untuk memilih pod dengan label app=karsajobs
  ports:
    - name: http # Nama port (opsional, tapi best practice)
      port: 80 # Port yang di-expose oleh Service
      targetPort: 8080 # Port yang digunakan container di dalam pod
      nodePort: 30080 # port di host/Minikube
