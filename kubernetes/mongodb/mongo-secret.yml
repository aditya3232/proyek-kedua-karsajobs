# mongo-secret.yml, manifest yang digunakan untuk menyimpan informasi sensitif
# deploy manifest : kubectl apply -f mongo-secret.yml -n databases

apiVersion: v1 # versi kubernetes v1 adalah versi API inti yang berisi banyak resource paling umum seperti Pod dan Node
kind: Secret # menandakan kubernetes object Secret (resource yang didefinisikan)
metadata: # informati terkait resource
  name: mongodb-secret # nama secret, akan direferensikan oleh Pod / StatefulSet
  namespace: karsajobs # namespace tempat Secret ini dibuat
type: Opaque # Secret generic (bebas, tidak punya format khusus)
data:
  MONGO_ROOT_USERNAME: YWRtaW4= # Username root MongoDB (base64 dari 'admin')
  MONGO_ROOT_PASSWORD: c3VwZXJzZWNyZXRwYXNzd29yZA== # Password root MongoDB (base64 dari 'supersecretpassword')
